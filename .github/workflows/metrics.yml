name: GitHub Profile Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LakshmanTurlapati
          template: classic
          base: ""
          filename: metrics-languages.svg
          config_timezone: America/Chicago
          plugin_isocalendar: no
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      - name: Generate isocalendar SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LakshmanTurlapati
          template: classic
          base: ""
          filename: metrics-isocalendar.svg
          config_display: large
          config_timezone: America/Chicago
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: no

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pygal

      - name: Generate radar chart
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USER: LakshmanTurlapati
        run: python scripts/generate_radar.py

      - name: Commit radar chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add radar-chart.svg
          git diff --staged --quiet || git commit -m "Update radar-chart.svg - [Skip GitHub Action]"
          git push
