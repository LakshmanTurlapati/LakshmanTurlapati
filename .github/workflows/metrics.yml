name: GitHub Profile Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-profile-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Generate languages SVG
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34/latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LakshmanTurlapati
          template: classic
          base: ""
          filename: metrics-languages.svg
          output_action: none
          config_timezone: America/Chicago
          plugin_isocalendar: no
          plugin_languages: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes

      - name: Copy languages SVG
        run: |
          set -euo pipefail
          sudo cp /metrics_renders/metrics-languages.svg metrics-languages.svg
          sudo chown "$(id -u):$(id -g)" metrics-languages.svg

      - name: Generate isocalendar SVG
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34/latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LakshmanTurlapati
          template: classic
          base: ""
          filename: metrics-isocalendar.svg
          output_action: none
          config_display: large
          config_timezone: America/Chicago
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: no

      - name: Copy isocalendar SVG
        run: |
          set -euo pipefail
          sudo cp /metrics_renders/metrics-isocalendar.svg metrics-isocalendar.svg
          sudo chown "$(id -u):$(id -g)" metrics-isocalendar.svg

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate radar chart
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USER: LakshmanTurlapati
        run: python scripts/generate_radar.py

      - name: Commit generated stats
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics-languages.svg metrics-isocalendar.svg radar-chart.svg
          if git diff --staged --quiet; then
            echo "No generated stats changes."
            exit 0
          fi
          git commit -m "Update generated stats [skip actions]"
          git pull --rebase
          git push
